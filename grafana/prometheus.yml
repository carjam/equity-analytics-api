# Example Prometheus config for scraping meiken
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'meiken'
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:8080']
