# TLS: completely optional. Default is HTTP only on port 8080.
# Production: use reverse proxy (nginx, ALB) for SSL; do not set sslPort here.
# Optional in-app SSL: set KEY_STORE_PATH, KEY_STORE_PASSWORD, KEY_ALIAS and uncomment sslPort below.
ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        # sslPort = 8443
        # sslPort = ${?SSL_PORT}
    }
    application {
        modules = [ com.meiken.ApplicationKt.module ]
    }
    # Only used when sslPort is set and KEY_STORE_PATH is provided
    security {
        ssl {
            keyStore = ${?KEY_STORE_PATH}
            keyStorePassword = ${?KEY_STORE_PASSWORD}
            keyAlias = ${?KEY_ALIAS}
        }
    }
}

# Environment: "production" | "development" (or any non-production). Drives Alpha Vantage output size and limiter messages.
# Override with env: MEIKEN_ENVIRONMENT=production
meiken {
    environment = "development"
    environment = ${?MEIKEN_ENVIRONMENT}

    # Security: API keys and CORS (disabled by default for development)
    security {
        apiKeysEnabled = false
        apiKeysEnabled = ${?API_KEYS_ENABLED}
        validApiKeys = ${?VALID_API_KEYS}
        requireHttps = false
        requireHttps = ${?REQUIRE_HTTPS}
        allowedOrigins = ${?ALLOWED_ORIGINS}
        maxStringLength = 100
    }

    # Alpha Vantage: apiKey from ALPHA_VANTAGE_API_KEY (optional; if missing, app uses mock data)
    # outputSize/limiter are derived from meiken.environment at runtime (see README)
    alphaVantage {
        apiKey = ${?ALPHA_VANTAGE_API_KEY}
        baseUrl = "https://www.alphavantage.co/query"
        timeout = 30000
        rawResponseLogLimit = 500
    }
    
    # type = "memory" (default) | "redis" (for horizontal scaling; Redis not implemented yet)
    cache {
        type = "memory"
        ttl = 3600
        ttl = ${?CACHE_TTL}
        maxSize = 1000
        maxSize = ${?CACHE_MAX_SIZE}
        # Staleness thresholds (seconds): dataFreshness label and staleness warning
        staleSeconds = 86400
        oneHourSeconds = 3600
        # Data quality: gap of more than this many consecutive missing days is reported
        gapThreshold = 5
        # Days within today to consider "recent" for stale-data warning (e.g. 5 = warn if to_date is within 5 days of today)
        recentDatesDays = 5
        recentDatesDays = ${?CACHE_RECENT_DATES_DAYS}
        # If actual days / expected trading days < sparseRatio, data quality is POOR
        sparseRatio = 0.5
        sparseRatio = ${?CACHE_SPARSE_RATIO}
        # redis {
        #     host = ${?REDIS_HOST}
        #     port = 6379
        #     password = ${?REDIS_PASSWORD}
        #     database = 0
        #     ttl = 3600
        # }
    }

    # Trading days per year (e.g. 252 for US equity); used for annualization and data-quality expected days
    calculations {
        tradingDaysPerYear = 252
    }

    # Price/return validation thresholds; override per env (e.g. stricter in prod)
    dataQuality {
        minPrice = 0.01
        minPrice = ${?DATA_QUALITY_MIN_PRICE}
        maxPrice = 1000000
        maxPrice = ${?DATA_QUALITY_MAX_PRICE}
        maxSingleDayChangePct = 0.50
        outlierSigma = 3.0
    }

    # Default query defaults (can override per env)
    defaults {
        riskFreeRate = 0.04
        riskFreeRate = ${?DEFAULTS_RISK_FREE_RATE}
        correlationWindow = 30
        correlationWindow = ${?DEFAULTS_CORRELATION_WINDOW}
    }

    performance {
        compression {
            enabled = true
            minSize = 1024
            level = 6
        }
    }
    
    rateLimit {
        requestsPerMinute = 100
        authenticatedPerMinute = 1000
    }
    
    # Max calendar days allowed per date range (from_date to to_date); override per env if needed
    dateRanges {
        maxDays = 365
        maxDays = ${?DATE_RANGE_MAX_DAYS}
    }

    # API response headers: Cache-Control max-age for GET /api/v1/* (seconds)
    api {
        cacheControlMaxAgeSeconds = 300
        cacheControlMaxAgeSeconds = ${?API_CACHE_MAX_AGE_SECONDS}
    }

    # HTTP client pool (Alpha Vantage); override per env if needed
    httpClient {
        keepAliveTimeMs = 60000
        keepAliveTimeMs = ${?HTTP_CLIENT_KEEP_ALIVE_MS}
        maxConnectionsPerRoute = 50
        maxConnectionsPerRoute = ${?HTTP_CLIENT_MAX_CONNECTIONS_PER_ROUTE}
    }

    resilience {
        circuitBreaker {
            failureRateThreshold = 50
            slowCallDurationThreshold = 5000
            minimumNumberOfCalls = 5
            waitDurationInOpenState = 60000
            permittedNumberOfCallsInHalfOpenState = 3
        }
        retry {
            maxAttempts = 3
            waitDuration = 100
            multiplier = 2
            maxWaitDuration = 1000
        }
        timeout {
            requestTimeout = 60000
            alphaVantageTimeout = 30000
            connectionTimeout = 10000
        }
        bulkhead {
            maxConcurrentCalls = 10
            maxWaitDuration = 5000
        }
    }
}
