# TLS: completely optional. Default is HTTP only on port 8080.
# Production: use reverse proxy (nginx, ALB) for SSL; do not set sslPort here.
# Optional in-app SSL: set KEY_STORE_PATH, KEY_STORE_PASSWORD, KEY_ALIAS and uncomment sslPort below.
ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        # sslPort = 8443
        # sslPort = ${?SSL_PORT}
    }
    application {
        modules = [ com.meiken.ApplicationKt.module ]
    }
    # Only used when sslPort is set and KEY_STORE_PATH is provided
    security {
        ssl {
            keyStore = ${?KEY_STORE_PATH}
            keyStorePassword = ${?KEY_STORE_PASSWORD}
            keyAlias = ${?KEY_ALIAS}
        }
    }
}

# Environment: "production" | "development" (or any non-production). Drives Alpha Vantage output size and limiter messages.
# Override with env: MEIKEN_ENVIRONMENT=production
meiken {
    environment = "development"
    environment = ${?MEIKEN_ENVIRONMENT}

    # Security: API keys and CORS (disabled by default for development)
    security {
        apiKeysEnabled = false
        apiKeysEnabled = ${?API_KEYS_ENABLED}
        validApiKeys = ${?VALID_API_KEYS}
        requireHttps = false
        requireHttps = ${?REQUIRE_HTTPS}
        allowedOrigins = ${?ALLOWED_ORIGINS}
    }

    # Alpha Vantage: apiKey from ALPHA_VANTAGE_API_KEY (optional; if missing, app uses mock data)
    # outputSize/limiter are derived from meiken.environment at runtime (see README)
    alphaVantage {
        apiKey = ${?ALPHA_VANTAGE_API_KEY}
        baseUrl = "https://www.alphavantage.co/query"
        timeout = 30000
    }
    
    cache {
        ttl = 3600
        maxSize = 1000
    }
    
    rateLimit {
        requestsPerMinute = 100
        authenticatedPerMinute = 1000
    }
    
    dateRanges {
        maxDays = 365
    }
}
