ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.meiken.ApplicationKt.module ]
    }
}

meiken {
    alphaVantage {
        apiKey = ${ALPHA_VANTAGE_API_KEY}
        baseUrl = "https://www.alphavantage.co/query"
        timeout = 30000
    }
    
    cache {
        ttl = 3600
        maxSize = 1000
    }
    
    rateLimit {
        requestsPerMinute = 100
    }
    
    dateRanges {
        maxDays = 365
    }
}
