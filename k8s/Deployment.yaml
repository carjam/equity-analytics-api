apiVersion: apps/v1
kind: Deployment
metadata:
  name: meiken
  labels:
    app: meiken
spec:
  replicas: 3
  selector:
    matchLabels:
      app: meiken
  template:
    metadata:
      labels:
        app: meiken
    spec:
      containers:
        - name: meiken
          image: meiken:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: MEIKEN_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: meiken-config
                  key: environment
            - name: ALPHA_VANTAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: meiken-secrets
                  key: alpha-vantage-api-key
                  optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
